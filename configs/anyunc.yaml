experiment: 
    examples_generation:
        model: "ollama:llama3.1:8b"
        # Model mapping: ollama:llama3.1:8b -> uses Ollama API
        # For local HuggingFace models, use format: "meta-llama/Llama-3.1-8B-Instruct"
        generation_kwargs:
            max_new_tokens: 250
            temperature: 0.7
            top_p: 0.9
            num_beams: 4
            num_return_sequences: 1

    answering:
        model: "ollama:llama3.1:8b"
        # Model mapping: ollama:llama3.1:8b -> uses Ollama API
        # For local HuggingFace models, use format: "meta-llama/Llama-3.1-8B-Instruct"
        generation_kwargs:
            max_new_tokens: 250
            temperature: 0.0
            top_p: 0.1
            num_beams: 4
            num_return_sequences: 1
    